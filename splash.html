<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="16x16" href="./logo.svg">
    <title>Motifta - Shaping Software Transforming Tomorrow</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #333333;
            overflow: hidden;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./logo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 1;
            animation: 
                expand-and-brighten 3s ease-out,
                fade-out 2s ease-in-out forwards;
            animation-delay: 0s, 3s;
            pointer-events: none;
        }

        @keyframes expand-and-brighten {
            0% {
                transform: scale(0.1);
                filter: brightness(0.1);
            }
            100% {
                transform: scale(1);
                filter: brightness(1.5);
            }
        }

        @keyframes fade-out {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <script>
        // Optional: Redirect to index.html after animation completes
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 5000);
    </script>
</body>
</html>
